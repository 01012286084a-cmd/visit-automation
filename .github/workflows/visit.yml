name: Visit Automation

on:
  schedule:
    - cron: '30 7 * * *'   # 9:30 صباحاً بتوقيت مصر (7:30 UTC)
  workflow_dispatch:        # عشان تشغله يدوي من GitHub

env:
  SUBMIT: "true"
  SEND_EMAIL_RECEIPT: "true"

jobs:
  run-visit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install openpyxl playwright requests
          playwright install chromium
          sudo apt update -qq
          sudo apt install -y -qq xvfb
      - name: Run visit form
        run: xvfb-run python visit_master_3_distributors_clearform_v4.py
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: data/screenshots/
